<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="goldGradIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4BC7C"/>
      <stop offset="50%" stop-color="#C6A75E"/>
      <stop offset="100%" stop-color="#B89545"/>
    </linearGradient>
    <linearGradient id="irisGradIcon" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#E8D9A8"/>
      <stop offset="50%" stop-color="#C6A75E"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <radialGradient id="shineIcon" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#111111"/>

  <!-- Outer eye shape -->
  <path d="M32 16 C22 16 12 28 9 32 C12 36 22 48 32 48 C42 48 52 36 55 32 C52 28 42 16 32 16Z" 
        stroke="url(#goldGradIcon)" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Lens circle (outer) -->
  <circle cx="32" cy="32" r="12" stroke="url(#goldGradIcon)" stroke-width="1.5" fill="none"/>
  
  <!-- Iris -->
  <circle cx="32" cy="32" r="8.5" fill="url(#irisGradIcon)" opacity="0.25"/>
  
  <!-- Inner iris ring -->
  <circle cx="32" cy="32" r="6" stroke="url(#goldGradIcon)" stroke-width="1.2" fill="none"/>
  
  <!-- Pupil -->
  <circle cx="32" cy="32" r="3" fill="#111111"/>
  
  <!-- Shine -->
  <circle cx="29" cy="29" r="2.2" fill="url(#shineIcon)"/>
  <circle cx="35" cy="34" r="0.9" fill="white" opacity="0.4"/>
  
  <!-- Decorative toric lines -->
  <path d="M32 20 Q36 26 32 32" stroke="url(#goldGradIcon)" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M32 44 Q28 38 32 32" stroke="url(#goldGradIcon)" stroke-width="0.5" fill="none" opacity="0.4"/>
</svg>
